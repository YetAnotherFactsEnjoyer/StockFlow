version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: stockflow-db
    environment:
      POSTGRES_DB: stockflow
      POSTGRES_USER: stockflow_user
      POSTGRES_PASSWORD: stockflow_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
